sports_question_task:
  description: >
    Answer any user question related to sports (rules, events, players, teams, tournaments, schedules, or results).
    Respond in the same language as the user's query.

    Follow this process:
    1. Detect the user's query language.
    2. First use the `search_knowledgebase` tool to retrieve relevant information 
       from the Sports RAG vector database.
    3. If no relevant information is found, use the `search_internet` tool to gather 
       recent or missing information.
    4. Generate a clear, friendly, and accurate answer in the user's language.
    5. When the answer uses retrieved information, include source links in a new line using:
       **Source**: [Link]
    6. If the answer is based solely on general internal knowledge, do NOT include a source link.
    7. Prioritize reliable multisport official sources such as:
       - https://www.espn.com
       - https://www.olympics.com
       - https://www.fifa.com
       - https://www.icc-cricket.com
       - https://www.nba.com

    User Query: {query}

    Chat History: {chat_history}

  expected_output: >
    A detailed, friendly, and accurate sports-related answer in the same language as the user's query, 
    including source links when external data retrieval was used.
